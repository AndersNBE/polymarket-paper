name: Paper Trade

on:
  # External cron service (cron-job.org) hits the GitHub API to fire this,
  # because GitHub's own scheduled cron is unreliable. Backup schedule kept
  # in case external service ever goes down.
  repository_dispatch:
    types: [paper-trade]
  workflow_dispatch: {}
  schedule:
    - cron: "0 */2 * * *"   # fallback every 2 hours

permissions:
  contents: write

concurrency:
  group: paper-trade
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run V1 cycle (baseline, z>=5, 48h hold, both directions)
        run: python3 -u paper_trader.py --version v1 --single

      - name: Run V2 cycle (improved, z>=7, 12h hold, short only)
        if: always()
        run: python3 -u paper_trader.py --version v2 --single

      - name: Print status summary
        if: always()
        run: |
          echo "--- V1 status ---"
          python3 paper_trader.py --version v1 --status || true
          echo ""
          echo "--- V2 status ---"
          python3 paper_trader.py --version v2 --status || true

      - name: Commit state changes
        if: always()
        run: |
          git config user.name "paper-trader-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f paper_state.json paper_trades.jsonl paper_signals.jsonl \
                    paper_state_v2.json paper_trades_v2.jsonl paper_signals_v2.jsonl 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No state changes this cycle"
          else
            git commit -m "cycle $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase origin main || true
            git push origin main || true
          fi
